name: Build Fold Check APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform and build-tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Bootstrap fixed debug keystore
        run: |
          if [ ! -f keystore/debug.keystore ]; then
            mkdir -p keystore
            keytool -genkeypair -v \
              -keystore keystore/debug.keystore \
              -storepass foldcheck \
              -keypass foldcheck \
              -alias foldcheck \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=foldcheck"
            git config user.name "ci"
            git config user.email "ci@local"
            git add keystore/debug.keystore
            git commit -m "chore: add fixed debug keystore [skip ci]"
            git push
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: foldcheck-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_attempt }}
          name: build-${{ github.run_number }}-${{ github.run_attempt }}
          files: app/build/outputs/apk/debug/app-debug.apk
